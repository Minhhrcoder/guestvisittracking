<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Guest Visit Tracking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="guest-page">
    <div class="guest-logo">🏢</div>
    <h1 class="guest-title">Orient Software</h1>
    <p class="guest-sub">Guest Visit Tracking — Admin Login</p>

    <div class="guest-card" style="max-width:380px">
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="l-user" placeholder="e.g. admin-hcm" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="l-pass" placeholder="Password" required autocomplete="current-password" />
        </div>
        <div class="thong-bao loi" id="l-error" style="display:none"></div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Login</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
