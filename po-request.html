<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Request — Orient's Admin Tool</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="guest-page">
    <div class="guest-logo"><img src="logo.svg" style="width:72px;height:72px" /></div>
    <h1 class="guest-title">Orient Software</h1>
    <p class="guest-sub">Purchase Request Form</p>

    <!-- FORM -->
    <div class="guest-card" id="card-form" style="max-width:480px">
      <form id="form-po">
        <div class="form-group">
          <label>Item / Description *</label>
          <input type="text" id="pr-item" placeholder="What do you need?" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Your Name *</label>
            <input type="text" id="pr-name" placeholder="Full name" required />
          </div>
          <div class="form-group">
            <label>Department *</label>
            <input type="text" id="pr-dept" placeholder="e.g. ICS, C&B, P&C" required />
          </div>
        </div>
        <div class="form-group">
          <label>Company (Purchase for) *</label>
          <select id="pr-company" required>
            <option value="">-- Select company --</option>
            <option value="Orient">Orient</option>
            <option value="Bravo">Bravo</option>
            <option value="Neurond">Neurond</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantity *</label>
            <input type="number" id="pr-qty" placeholder="e.g. 5" min="1" required />
          </div>
          <div class="form-group">
            <label>Priority *</label>
            <select id="pr-priority" required>
              <option value="">-- Select --</option>
              <option value="Urgent">Urgent</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Date Needed By</label>
          <input type="date" id="pr-due" />
        </div>
        <div class="form-group">
          <label>Product Link</label>
          <input type="url" id="pr-link" placeholder="https://... (optional)" />
        </div>
        <div class="form-group">
          <label>Budget Type *</label>
          <select id="pr-budget" required>
            <option value="">-- Select --</option>
            <option value="Annual Budget">Annual Budget (nằm trong budget hàng năm)</option>
            <option value="Additional Budget">Additional Budget / Phát sinh</option>
          </select>
        </div>
        <div class="form-group">
          <label>Note / Additional Info</label>
          <input type="text" id="pr-note" placeholder="Quantity, specs, links..." />
        </div>
        <div class="thong-bao" id="tb-pr"></div>
        <button type="submit" class="btn-primary" style="width:100%">Submit Request</button>
      </form>
    </div>

    <!-- SUCCESS -->
    <div class="guest-card success-card" id="card-success" style="display:none;max-width:480px">
      <div class="check-icon">✓</div>
      <h2>Request Submitted!</h2>
      <p style="color:#6b7280;margin-bottom:8px">Your tracking ID</p>
      <div class="visitor-no" id="pr-tracking-id" style="font-size:18px;letter-spacing:2px"></div>
      <p style="font-size:13px;color:#6b7280;margin-top:12px">Save this link to track your request status:</p>
      <a id="pr-tracking-link" href="#" target="_blank"
         style="display:block;margin:12px 0;font-size:13px;color:#1a56db;word-break:break-all;text-decoration:underline"></a>
      <button class="btn-secondary" onclick="copyLink()" style="width:100%;margin-bottom:8px">📋 Copy Tracking Link</button>
      <button class="btn-secondary" style="width:100%" onclick="newRequest()">Submit Another Request</button>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script src="po-request.js"></script>
</body>
</html>
