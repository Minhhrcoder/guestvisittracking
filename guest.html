<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="guest-page">
    <div class="guest-logo">🏢</div>
    <h1 class="guest-title">Orient Software</h1>
    <p class="guest-sub">Visitor Registration Form</p>

    <!-- REGISTRATION FORM -->
    <div class="guest-card" id="card-form">
      <div style="text-align:center;margin-bottom:16px">
        <span class="location-badge" id="loc-badge"></span>
      </div>
      <form id="form-guest">
        <div class="form-group">
          <label>Visitor Name (Full Name) *</label>
          <input type="text" id="g-name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label>Company's Name *</label>
          <input type="text" id="g-company" placeholder="ABC Company" required />
        </div>
        <div class="form-group">
          <label>ID Number / Passport</label>
          <input type="text" id="g-id" placeholder="0123456789" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date In *</label>
            <input type="date" id="g-date" required />
          </div>
          <div class="form-group">
            <label>Time In *</label>
            <input type="time" id="g-time" required />
          </div>
        </div>
        <div class="form-group">
          <label>Purpose *</label>
          <select id="g-purpose" required onchange="toggleOther()">
            <option value="">-- Select purpose --</option>
            <option value="Interview">Interview</option>
            <option value="Business Meeting">Business Meeting</option>
            <option value="Delivery">Delivery</option>
            <option value="Site Visit">Site Visit</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group" id="other-group" style="display:none">
          <label>Please specify *</label>
          <input type="text" id="g-other" placeholder="Describe your purpose..." />
        </div>
        <div class="form-group">
          <label>Person / Department to Meet</label>
          <input type="text" id="g-meet" placeholder="Name or department" />
        </div>
        <div class="thong-bao" id="tb-guest"></div>
        <button type="submit" class="btn-primary" style="width:100%">Register</button>
      </form>
    </div>

    <!-- SUCCESS SCREEN -->
    <div class="guest-card success-card" id="card-success" style="display:none">
      <div class="check-icon">✓</div>
      <h2>Registration Successful!</h2>
      <p style="color:#6b7280;margin-bottom:8px">Your visitor number</p>
      <div class="visitor-no" id="visitor-no"></div>
      <p style="font-size:13px;color:#6b7280;margin-top:12px">Please proceed to the reception desk to collect your visitor card.</p>
      <button class="btn-secondary" style="margin-top:20px;width:100%" onclick="dangKyMoi()">Register Another Visitor</button>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script src="guest.js"></script>
</body>
</html>
