<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="guest-page">
    <div class="guest-logo">🏢</div>
    <h1 class="guest-title">Orient Software</h1>
    <p class="guest-sub">Visitor Registration Form / <span style="font-size:14px">Phiếu Đăng Ký Khách Thăm</span></p>

    <!-- REGISTRATION FORM -->
    <div class="guest-card" id="card-form">
      <form id="form-guest">

        <div class="form-group">
          <label>Office / <span class="vn">Văn phòng</span> *</label>
          <select id="g-location" required>
            <option value="">-- Select / Chọn văn phòng --</option>
            <option value="HCM">Ho Chi Minh City / TP. Hồ Chí Minh</option>
            <option value="DN">Da Nang / Đà Nẵng</option>
            <option value="HN">Ha Noi / Hà Nội</option>
            <option value="Hue">Hue / Huế</option>
          </select>
        </div>

        <div class="form-group">
          <label>Visitor Name / <span class="vn">Họ và tên</span> *</label>
          <input type="text" id="g-name" placeholder="John Doe / Nguyễn Văn A" required />
        </div>

        <div class="form-group">
          <label>Company / <span class="vn">Tên công ty</span> *</label>
          <input type="text" id="g-company" placeholder="ABC Company" required />
        </div>

        <div class="form-group">
          <label>ID Number / Passport / <span class="vn">CMND / Hộ chiếu</span></label>
          <input type="text" id="g-id" placeholder="0123456789" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date In / <span class="vn">Ngày vào</span> *</label>
            <input type="date" id="g-date" required />
          </div>
          <div class="form-group">
            <label>Time In / <span class="vn">Giờ vào</span> *</label>
            <input type="time" id="g-time" required />
          </div>
        </div>

        <div class="form-group">
          <label>Purpose / <span class="vn">Mục đích</span> *</label>
          <select id="g-purpose" required onchange="toggleOther()">
            <option value="">-- Select / Chọn mục đích --</option>
            <option value="Interview">Interview / Phỏng vấn</option>
            <option value="Business Meeting">Business Meeting / Họp kinh doanh</option>
            <option value="Delivery">Delivery / Giao hàng</option>
            <option value="Site Visit">Site Visit / Tham quan</option>
            <option value="Other">Other / Khác</option>
          </select>
        </div>

        <div class="form-group" id="other-group" style="display:none">
          <label>Please specify / <span class="vn">Vui lòng ghi rõ</span> *</label>
          <input type="text" id="g-other" placeholder="Describe your purpose / Mô tả mục đích..." />
        </div>

        <div class="form-group">
          <label>Person / Department to Meet / <span class="vn">Người / Phòng ban cần gặp</span></label>
          <input type="text" id="g-meet" placeholder="Name or department / Tên hoặc phòng ban" />
        </div>

        <div class="thong-bao" id="tb-guest"></div>
        <button type="submit" class="btn-primary" style="width:100%">Register / Đăng ký</button>
      </form>
    </div>

    <!-- SUCCESS SCREEN -->
    <div class="guest-card success-card" id="card-success" style="display:none">
      <div class="check-icon">✓</div>
      <h2>Registration Successful! / Đăng ký thành công!</h2>
      <p style="color:#6b7280;margin-bottom:8px">Your visitor number / Số thứ tự của bạn</p>
      <div class="visitor-no" id="visitor-no"></div>
      <p style="font-size:13px;color:#6b7280;margin-top:12px">Please proceed to the reception desk to collect your visitor card.<br><span style="font-size:12px">Vui lòng đến quầy lễ tân để nhận thẻ khách.</span></p>
      <button class="btn-secondary" style="margin-top:20px;width:100%" onclick="dangKyMoi()">Register Another / Đăng ký khách khác</button>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script src="guest.js"></script>
</body>
</html>
